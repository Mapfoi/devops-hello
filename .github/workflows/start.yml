name: Start Environment


on:

  workflow_dispatch:


jobs:


  start:


    runs-on: ubuntu-latest


    timeout-minutes: 10


    steps:


      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash

          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH



      - name: Authenticate Yandex Cloud CLI
        run: |
          echo '${{ secrets.YC_SERVICE_ACCOUNT_JSON }}' > /tmp/key.json

          chmod 600 /tmp/key.json

          yc config profile create github-actions

          yc config set service-account-key /tmp/key.json

          yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}

          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}



      - name: Start application VM
        run: |
          yc compute instance start devops-app-vm



      - name: Start monitoring VM
        run: |
          yc compute instance start devops-monitoring-vm



      - name: Verify application VM status
        run: |
          STATUS=$(yc compute instance get devops-app-vm --format json | jq -r '.status')

          echo "Application VM status: $STATUS"

          if [ "$STATUS" != "RUNNING" ]; then
            echo "Expected RUNNING, got $STATUS"
            exit 1
          fi



      - name: Verify monitoring VM status
        run: |
          STATUS=$(yc compute instance get devops-monitoring-vm --format json | jq -r '.status')

          echo "Monitoring VM status: $STATUS"

          if [ "$STATUS" != "RUNNING" ]; then
            echo "Expected RUNNING, got $STATUS"
            exit 1
          fi
