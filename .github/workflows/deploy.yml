name: Deploy to Yandex Cloud

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  TF_VERSION: 1.5.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # Создаем JSON-файл с ключом из секрета
      - name: Create service account key file
        run: |
          mkdir -p /tmp
          echo '${{ secrets.YC_SERVICE_ACCOUNT_JSON }}' > /tmp/key.json
          chmod 600 /tmp/key.json
          echo "KEY_FILE=/tmp/key.json" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        run: |
          DOCKER_IMAGE="${{ secrets.DOCKER_USERNAME }}/devops-hello:${{ github.sha }}"
          docker build -t $DOCKER_IMAGE ./app
          docker push $DOCKER_IMAGE
          docker tag $DOCKER_IMAGE "${{ secrets.DOCKER_USERNAME }}/devops-hello:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/devops-hello:latest"
          echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> $GITHUB_ENV

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve \
            -var="yc_service_account_key_file=${{ env.KEY_FILE }}" \
            -var="yc_cloud_id=${{ secrets.YC_CLOUD_ID }}" \
            -var="yc_folder_id=${{ secrets.YC_FOLDER_ID }}" \
            -var="docker_image=${{ secrets.DOCKER_USERNAME }}/devops-hello:${{ github.sha }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Get VM IPs
        id: get_ips
        run: |
          cd terraform
          echo "APP_IP=$(terraform output -raw app_vm_ip)" >> $GITHUB_OUTPUT
          echo "MONITORING_IP=$(terraform output -raw monitoring_vm_ip)" >> $GITHUB_OUTPUT

      - name: Wait for VM
        run: sleep 60

      - name: Deploy application
        run: |
          APP_IP="${{ steps.get_ips.outputs.APP_IP }}"
          echo "📡 Deploying to $APP_IP"
          
          mkdir -p ~/.ssh
          ssh-keyscan -H $APP_IP >> ~/.ssh/known_hosts 2>/dev/null || true
          
          for i in {1..30}; do
            if ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no ubuntu@$APP_IP "echo 'SSH ready'" 2>/dev/null; then
              echo "✅ SSH ready after $i attempts"
              break
            fi
            echo "⏳ Waiting for SSH... attempt $i/30"
            sleep 10
          done
          
          ssh -o StrictHostKeyChecking=no ubuntu@$APP_IP << 'ENDSSH'
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/devops-hello:${{ github.sha }}
            sudo docker stop devops-app || true
            sudo docker rm devops-app || true
            sudo docker run -d \
              --name devops-app \
              --restart=always \
              --env-file=/etc/environment \
              -p 80:8080 \
              ${{ secrets.DOCKER_USERNAME }}/devops-hello:${{ github.sha }}
          ENDSSH

      - name: Deploy monitoring
        run: |
          MONITORING_IP="${{ steps.get_ips.outputs.MONITORING_IP }}"
          echo "📊 Deploying monitoring to $MONITORING_IP"
          
          ssh-keyscan -H $MONITORING_IP >> ~/.ssh/known_hosts 2>/dev/null || true
          
          scp -o StrictHostKeyChecking=no -r ./monitoring ubuntu@$MONITORING_IP:/opt/
          
          ssh -o StrictHostKeyChecking=no ubuntu@$MONITORING_IP << 'ENDSSH'
            cd /opt/monitoring
            sudo docker-compose down || true
            sudo docker-compose up -d
          ENDSSH

      - name: Deployment info
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "=========================================="
          echo ""
          echo "🌐 Application: http://${{ steps.get_ips.outputs.APP_IP }}"
          echo "📊 Prometheus: http://${{ steps.get_ips.outputs.MONITORING_IP }}:9090"
          echo "📈 Grafana: http://${{ steps.get_ips.outputs.MONITORING_IP }}:3000"
          echo "   Login: admin / admin"
          echo ""
          echo "=========================================="
