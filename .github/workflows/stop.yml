name: Stop Environment


on:

  workflow_dispatch:


jobs:


  stop:


    runs-on: ubuntu-latest


    timeout-minutes: 10


    steps:


      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash

          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH



      - name: Authenticate Yandex Cloud CLI
        run: |
          echo '${{ secrets.YC_SERVICE_ACCOUNT_JSON }}' > /tmp/key.json

          chmod 600 /tmp/key.json

          yc config profile create github-actions

          yc config set service-account-key /tmp/key.json

          yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}

          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}



      - name: Stop application VM
        run: |
          yc compute instance stop devops-app-vm



      - name: Stop monitoring VM
        run: |
          yc compute instance stop devops-monitoring-vm
